<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#c3c6d7",
              "on-surface": "#191c1e",
              "surface-container-high": "#e6e8ea",
              "secondary": "#712ae2",
              "secondary-container": "#8a4cfc",
              "on-primary": "#ffffff",
              "inverse-primary": "#b4c5ff",
              "on-secondary-fixed-variant": "#5a00c6",
              "tertiary-container": "#606e83",
              "surface-dim": "#d8dadc",
              "secondary-fixed-dim": "#d2bbff",
              "on-secondary-container": "#fffbff",
              "on-background": "#191c1e",
              "on-tertiary-container": "#e9f0ff",
              "on-surface-variant": "#434655",
              "primary-container": "#2563eb",
              "surface-variant": "#e0e3e5",
              "surface-tint": "#0053db",
              "inverse-surface": "#2d3133",
              "surface-bright": "#f7f9fb",
              "outline": "#737686",
              "on-error-container": "#93000a",
              "primary": "#004ac6",
              "on-tertiary": "#ffffff",
              "surface-container": "#eceef0",
              "surface-container-lowest": "#ffffff",
              "background": "#f7f9fb",
              "surface": "#f7f9fb",
              "primary-fixed": "#dbe1ff",
              "inverse-on-surface": "#eff1f3",
              "tertiary-fixed-dim": "#b9c7df",
              "tertiary": "#48566a",
              "on-primary-fixed-variant": "#003ea8",
              "on-tertiary-fixed": "#0d1c2e",
              "on-secondary": "#ffffff",
              "on-primary-container": "#eeefff",
              "on-tertiary-fixed-variant": "#3a485b",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#b4c5ff",
              "on-primary-fixed": "#00174b",
              "on-secondary-fixed": "#25005a",
              "secondary-fixed": "#eaddff",
              "surface-container-low": "#f2f4f6",
              "tertiary-fixed": "#d5e3fc",
              "surface-container-highest": "#e0e3e5",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f9fb;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface">
<!-- Suppressed Navigation Shell as per task (Transactional/Linear flow) -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12 md:py-24">
<div class="w-full max-w-md flex flex-col space-y-12">
<!-- Header Section: Apple Fitness Inspired Editorial Style -->
<header class="space-y-2">
<span class="font-headline text-primary font-extrabold tracking-tighter text-sm uppercase">Scholar Metric</span>
<h1 class="font-headline text-5xl md:text-6xl font-extrabold text-on-surface tracking-tight leading-[1.1]">
                    Join the Community
                </h1>
<div class="h-1 w-12 bg-primary rounded-full mt-6"></div>
</header>
<!-- Registration Form -->
<form class="flex flex-col space-y-10" onsubmit="return false;">
<!-- Role Selection Toggle -->
<div class="space-y-4">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant">Select Your Path</label>
<div class="flex p-1 bg-surface-container rounded-xl">
<button class="flex-1 py-3 text-sm font-semibold rounded-lg bg-surface-container-lowest text-primary shadow-sm transition-all duration-200" type="button">
                            Student
                        </button>
<button class="flex-1 py-3 text-sm font-medium rounded-lg text-on-surface-variant hover:text-on-surface transition-all duration-200" type="button">
                            Class Representative
                        </button>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-8">
<!-- Full Name -->
<div class="relative border-b border-outline-variant/30 focus-within:border-primary transition-colors duration-300">
<input class="block w-full px-0 py-4 bg-transparent border-none focus:ring-0 peer placeholder-transparent text-lg font-medium" id="fullname" placeholder=" " type="text"/>
<label class="absolute left-0 top-4 text-on-surface-variant/60 transition-all duration-300 pointer-events-none peer-placeholder-shown:text-lg peer-focus:text-xs peer-focus:-top-2 peer-focus:text-primary peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:text-xs" for="fullname">
                            Full Name
                        </label>
</div>
<!-- Email -->
<div class="relative border-b border-outline-variant/30 focus-within:border-primary transition-colors duration-300">
<input class="block w-full px-0 py-4 bg-transparent border-none focus:ring-0 peer placeholder-transparent text-lg font-medium" id="email" placeholder=" " type="email"/>
<label class="absolute left-0 top-4 text-on-surface-variant/60 transition-all duration-300 pointer-events-none peer-placeholder-shown:text-lg peer-focus:text-xs peer-focus:-top-2 peer-focus:text-primary peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:text-xs" for="email">
                            University Email
                        </label>
</div>
<!-- Password -->
<div class="relative border-b border-outline-variant/30 focus-within:border-primary transition-colors duration-300">
<input class="block w-full px-0 py-4 bg-transparent border-none focus:ring-0 peer placeholder-transparent text-lg font-medium" id="password" placeholder=" " type="password"/>
<label class="absolute left-0 top-4 text-on-surface-variant/60 transition-all duration-300 pointer-events-none peer-placeholder-shown:text-lg peer-focus:text-xs peer-focus:-top-2 peer-focus:text-primary peer-[:not(:placeholder-shown)]:-top-2 peer-[:not(:placeholder-shown)]:text-xs" for="password">
                            Password
                        </label>
<button class="absolute right-0 top-4 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-6 space-y-6">
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200">
                        Create Account
                    </button>
<div class="flex flex-col items-center space-y-4">
<a class="text-on-surface-variant text-sm font-medium hover:text-primary transition-colors" href="#">
                            Already have an account? <span class="text-primary font-bold">Login</span>
</a>
</div>
</div>
</form>
<!-- Social Proof / Footer Minimalistic -->
<footer class="pt-12 text-center">
<p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.2em] font-bold">
                    Empowering 20,000+ Students Globally
                </p>
</footer>
</div>
</main>
<!-- Decorative Elements (Asymmetric High-End Aesthetic) -->
<div class="fixed top-0 right-0 w-1/3 h-screen pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-12 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
</div>
<div class="fixed bottom-0 left-0 w-1/4 h-1/2 pointer-events-none overflow-hidden -z-10">
<div class="absolute -bottom-12 -left-12 w-72 h-72 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
